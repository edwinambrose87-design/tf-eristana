<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Resident Contact List</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { background-color: #f8f9fa; font-family: 'Segoe UI', sans-serif; }
        .header-red { background-color: #d62828; color: white; padding: 20px; border-radius: 0 0 30px 30px; margin-bottom: 30px; }
        .block-tile { border-radius: 15px; cursor: pointer; transition: 0.3s; border: 2px solid transparent; }
        .block-tile.active { border-color: #d62828; background-color: #fff1f1; }
        .unit-tile { background: white; border-radius: 12px; padding: 15px; text-align: center; font-weight: bold; box-shadow: 0 2px 5px rgba(0,0,0,0.05); cursor: pointer; }
        .unit-tile:active { background-color: #eee; }
        .back-btn { color: white; text-decoration: none; font-size: 0.9rem; }
    </style>
</head>
<body>

    <div class="header-red text-center">
        <div class="d-flex justify-content-between align-items-center mb-3">
            <a href="index.html" class="back-btn"><i class="fas fa-chevron-left"></i> BACK</a>
            <span style="font-size: 0.8rem; opacity: 0.8;">ERISTANA MANAGEMENT</span>
        </div>
        <h2 class="fw-bold">RESIDENT LIST</h2>
    </div>

    <div class="container">
        <div class="row g-3 mb-4">
            <div class="col-6">
                <div id="btnA" class="card block-tile active p-3 text-center shadow-sm" onclick="selectBlock('A')">
                    <h5 class="mb-0 fw-bold">BLOCK A</h5>
                </div>
            </div>
            <div class="col-6">
                <div id="btnB" class="card block-tile p-3 text-center shadow-sm" onclick="selectBlock('B')">
                    <h5 class="mb-0 fw-bold">BLOCK B</h5>
                </div>
            </div>
        </div>

        <div class="row g-3" id="unit-grid">
            </div>
    </div>

    <script>
        function selectBlock(blockLetter) {
            // Update UI highlight
            document.getElementById('btnA').classList.remove('active');
            document.getElementById('btnB').classList.remove('active');
            document.getElementById('btn' + blockLetter).classList.add('active');

            // Generate the 9 tiles
            const grid = document.getElementById('unit-grid');
            grid.innerHTML = ""; // Clear current tiles

            for (let i = 1; i <= 9; i++) {
                grid.innerHTML += `
                    <div class="col-4">
                        <div class="unit-tile shadow-sm" onclick="openContact('${blockLetter}${i}')">
                            ${blockLetter}${i}
                        </div>
                    </div>
                `;
            }
        }

        function openContact(unitName) {
            alert("Opening resident details for Unit: " + unitName);
            // Later we can make this open a phone number list
        }

        // Initialize with Block A on load
        window.onload = () => selectBlock('A');
    </script>
</body>
</html>
