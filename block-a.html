<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Resident List - TF Eristana</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <script src="supabase.js"></script>
    
    <style>
        body { background-color: #f8f9fa; font-family: 'Segoe UI', sans-serif; padding-bottom: 100px; overflow-x: hidden; }
        
        /* Header Section */
        .header-section { 
            background-color: #d62828; 
            color: white; 
            padding: 50px 20px 100px 20px; 
            text-align: center; 
        }
        
        .overlap-container { margin-top: -60px; position: relative; z-index: 10; }

        /* Block Selection Buttons */
        .block-card { 
            background: #e9ecef; border-radius: 25px; padding: 25px 15px; 
            text-align: center; cursor: pointer; color: #adb5bd; border: none; 
            transition: 0.3s; 
        }
        .block-card.active { background: white; color: black; box-shadow: 0 15px 30px rgba(0,0,0,0.15); }
        .block-card i { font-size: 2.2rem; margin-bottom: 8px; display: block; }

        /* Building & Unit Grid */
        .building-tile { 
            background: white; border-radius: 20px; padding: 22px 5px; 
            text-align: center; font-weight: bold; box-shadow: 0 4px 10px rgba(0,0,0,0.05); 
            margin-bottom: 10px; cursor: pointer; border: 1px solid #eee; color: #212529; 
        }
        .floor-label { 
            background: #212529; color: white; border-radius: 10px; padding: 6px 15px; 
            display: inline-block; font-size: 0.75rem; margin: 20px 0 10px 0; 
            font-weight: bold; width: 100%; text-align: center; 
        }
        .unit-pill { 
            background: #fff; border: 1px solid #dee2e6; border-radius: 18px; 
            padding: 18px 5px; text-align: center; font-weight: bold; 
            font-size: 0.85rem; cursor: pointer; color: #212529; 
        }

        .divider-container { display: flex; align-items: center; text-align: center; margin: 30px 0; font-weight: bold; }
        .divider-container::before, .divider-container::after { content: ''; flex: 1; border-bottom: 2px solid #212529; }
        .divider-text { margin: 0 15px; letter-spacing: 2px; text-transform: uppercase; font-size: 0.85rem; color: #212529; }

        /* Contact Profile Card */
        .profile-card { background: white; border-radius: 35px; padding: 40px 20px; text-align: center; box-shadow: 0 15px 40px rgba(0,0,0,0.1); }
        .profile-icon { background: #f8f9fa; width: 90px; height: 90px; line-height: 90px; border-radius: 50%; margin: 0 auto 20px; font-size: 2.5rem; color: #d62828; }
        
        .btn-call { background-color: #28a745; color: white; border-radius: 50px; padding: 18px; font-size: 1.1rem; font-weight: bold; width: 100%; margin-top: 15px; text-decoration: none; display: inline-block; }
        .btn-whatsapp { background-color: #25D366; color: white; border-radius: 50px; padding: 18px; font-size: 1.1rem; font-weight: bold; width: 100%; margin-top: 15px; text-decoration: none; display: inline-block; }
        .back-pill { background: #343a40; color: white; border-radius: 50px; padding: 12px 30px; display: inline-block; text-decoration: none; font-weight: bold; font-size: 0.8rem; margin-top: 25px; cursor: pointer; }
        
        .loading-wrapper { display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 300px; width: 100%; text-align: center; }
    </style>
</head>
<body>

    <div class="header-section">
        <div style="font-size: 0.8rem; letter-spacing: 3px; margin-bottom: 10px; opacity: 0.9;">TF ERISTANA</div>
        <h1 style="font-weight: 800; margin: 0;" id="page-title">RESIDENT LIST</h1>
    </div>

    <div class="container overlap-container">
        
        <div id="block-selector">
            <div class="row g-3">
                <div class="col-6">
                    <div id="btnA" class="block-card active" onclick="loadBuildingGrid('A')">
                        <i class="fas fa-building"></i>
                        <div class="fw-bold">BLOCK A</div>
                    </div>
                </div>
                <div class="col-6">
                    <div id="btnB" class="block-card" onclick="loadBuildingGrid('B')">
                        <i class="fas fa-city"></i>
                        <div class="fw-bold">BLOCK B</div>
                    </div>
                </div>
            </div>
            <div class="divider-container">
                <span class="divider-text" id="divider-label">BLOCK A</span>
            </div>
        </div>

        <div id="dynamic-content" class="row g-2"></div>

        <div class="text-center mt-5">
            <a href="index.html" class="btn btn-dark rounded-pill px-4 fw-bold shadow-sm">
                <i class="fas fa-arrow-left me-2"></i> EXIT TO DASHBOARD
            </a>
        </div>
    </div>

    <script>
        const _URL = 'https://zfkcyhkpdijxepjkvowl.supabase.co'; 
        const _KEY = 'sb_publishable__w0R47jJvdnSJiE47E8KEQ_Z6nydqpd';
        
        let supabaseClient;
        let currentBlock = 'A';

        function getDB() {
            if (!supabaseClient && window.supabase) {
                supabaseClient = window.supabase.createClient(_URL, _KEY);
            }
            return supabaseClient;
        }

        // 1. Load the Building Grid (A1, A2, etc.)
        function loadBuildingGrid(block) {
            currentBlock = block;
            document.getElementById('block-selector').style.display = 'block';
            document.getElementById('page-title').innerText = "RESIDENT LIST";
            
            document.getElementById('btnA').className = (block === 'A') ? 'block-card active' : 'block-card';
            document.getElementById('btnB').className = (block === 'B') ? 'block-card active' : 'block-card';
            document.getElementById('divider-label').innerText = 'BLOCK ' + block;

            let count = (block === 'A') ? 11 : 10;
            let html = '';
            for (let i = 1; i <= count; i++) {
                html += `<div class="col-4"><div class="building-tile" onclick="loadUnitList('${block}${i}')">${block}${i}</div></div>`;
            }
            document.getElementById('dynamic-content').innerHTML = html;
        }

        // 2. Load the Unit Grid with Custom Layout Rules
        function loadUnitList(bid) {
            document.getElementById('block-selector').style.display = 'block'; 
            document.getElementById('divider-label').innerText = "UNITS IN " + bid;
            document.getElementById('page-title').innerText = "RESIDENT LIST";

            let unitsPerFloor = 4; // Default fallback

            // --- Apply your specific requirements ---
            // BLOCK A RULES
            if (['A1', 'A2', 'A3', 'A4', 'A5', 'A7'].includes(bid)) {
                unitsPerFloor = 8;
            } else if (['A6', 'A8'].includes(bid)) {
                unitsPerFloor = 4;
            } else if (['A9', 'A10', 'A11'].includes(bid)) {
                unitsPerFloor = 5;
            }
            
            // BLOCK B RULES
            else if (bid === 'B1') {
                unitsPerFloor = 5;
            } else if (['B2', 'B3', 'B4', 'B5', 'B6'].includes(bid)) {
                unitsPerFloor = 6;
            } else if (['B8', 'B9'].includes(bid)) {
                unitsPerFloor = 6;
            } else if (bid === 'B10') {
                unitsPerFloor = 13;
            } else if (bid === 'B7') {
                unitsPerFloor = 4;
            }

            let html = '';
            const floors = ['G', '1', '2'];
            floors.forEach(f => {
                let label = (f === 'G') ? "GROUND FLOOR" : "FLOOR " + f;
                html += `<div class="col-12"><div class="floor-label">${label}</div></div>`;
                for (let u = 1; u <= unitsPerFloor; u++) {
                    let unitFull = `${bid}-${f}-${u < 10 ? '0' + u : u}`;
                    html += `<div class="col-6 mb-1"><div class="unit-pill" onclick="loadContactProfile('${unitFull}', '${bid}')">${unitFull}</div></div>`;
                }
            });

            html += `<div class="col-12 text-center mt-3"><div class="back-pill" onclick="loadBuildingGrid('${currentBlock}')">BACK TO BUILDINGS</div></div>`;
            document.getElementById('dynamic-content').innerHTML = html;
            window.scrollTo({top: 0, behavior: 'smooth'});
        }

        // 3. Load Contact Profile from Supabase
        async function loadContactProfile(unitNumber, bid) {
            document.getElementById('block-selector').style.display = 'none';
            document.getElementById('page-title').innerText = "CONTACT INFO";

            document.getElementById('dynamic-content').innerHTML = `
                <div class="col-12 loading-wrapper">
                    <div class="spinner-border text-danger" role="status"></div>
                    <div class="mt-3 fw-bold">Connecting to Supabase...</div>
                </div>`;
            
            const db = getDB();
            const { data, error } = await db.from('Residents').select('*').eq('unit_number', unitNumber).single();

            if (error || !data) {
                document.getElementById('dynamic-content').innerHTML = `
                    <div class="col-12 text-center">
                        <div class="profile-card">
                            <i class="fas fa-exclamation-circle fa-3x text-warning mb-3"></i>
                            <h4>No Data Found</h4>
                            <p class="text-muted">Unit ${unitNumber} is not yet registered in the system.</p>
                            <div class="back-pill" onclick="loadUnitList('${bid}')">BACK</div>
                        </div>
                    </div>`;
                return;
            }

            // Clean phone number for WhatsApp
            let rawPhone = data.phone_number.toString().replace(/\D/g, ''); 
            if (rawPhone.startsWith('0')) rawPhone = '6' + rawPhone;

            document.getElementById('dynamic-content').innerHTML = `
                <div class="col-12">
                    <div class="profile-card">
                        <div class="profile-icon"><i class="fas fa-user-circle"></i></div>
                        <h4 class="fw-bold mb-1">${data.owner_name}</h4>
                        <span class="badge bg-dark mb-3 rounded-pill px-3">${(data.Title || 'Resident').toUpperCase()}</span>
                        <p class="text-muted small">Unit Number</p>
                        <h5 class="fw-bold">${unitNumber}</h5>
                        <hr class="my-4" style="opacity: 0.1;">
                        <p class="small text-uppercase mb-0" style="color: #999; letter-spacing: 1px;">Phone Number</p>
                        <h3 class="fw-bold" style="color: #d62828;">${data.phone_number}</h3>
                        <a href="tel:${data.phone_number}" class="btn-call"><i class="fas fa-phone-alt me-2"></i> CALL NOW</a>
                        <a href="https://wa.me/${rawPhone}?text=Hello%20${data.owner_name},%20ini%20adalah%20Eristana%20Security." class="btn-whatsapp">
                            <i class="fab fa-whatsapp me-2"></i> WHATSAPP TEXT
                        </a>
                        <div class="back-pill mt-4" onclick="loadUnitList('${bid}')">BACK TO UNITS</div>
                    </div>
                </div>`;
        }

        window.onload = () => loadBuildingGrid('A');
    </script>
</body>
</html>
